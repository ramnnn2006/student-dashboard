<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>VITrack - Student Dashboard</title>

    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600;700&display=swap" rel="stylesheet">

    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">

    <link rel="stylesheet" href="style.css">

    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <script src="data.js"></script>

    <style>
        .dashboard-container {
            padding: 3rem 5%;
            display: grid;
            grid-template-columns: 1fr 2fr;
            gap: 2rem;
        }

        @media (max-width: 900px) {
            .dashboard-container {
                grid-template-columns: 1fr;
            }
        }

        .dash-card {
            background: var(--bg-card);
            border-radius: 15px;
            padding: 2rem;
            border: 1px solid var(--glass-border);
            margin-bottom: 2rem;
        }

        .dash-card h2 {
            margin-bottom: 1.5rem;
            font-size: 1.4rem;
            color: var(--accent-blue);
            display: flex;
            align-items: center;
            gap: 0.5rem;
        }

        /* Profile details */
        .profile-header {
            text-align: center;
            margin-bottom: 2rem;
        }

        .profile-header h2 {
            justify-content: center;
        }

        .profile-img {
            width: 100px;
            height: 100px;
            background: var(--accent-purple);
            border-radius: 50%;
            margin: 0 auto 1rem;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 3rem;
        }

        .cgpa-display {
            background: linear-gradient(135deg, rgba(16, 185, 129, 0.2), rgba(16, 185, 129, 0.05));
            border: 1px solid rgba(16, 185, 129, 0.4);
            padding: 1.5rem;
            text-align: center;
            border-radius: 12px;
            margin-top: 1rem;
        }

        .cgpa-display h3 {
            font-size: 2.5rem;
            color: var(--accent-green);
            margin: 0;
            line-height: 1;
        }

        .cgpa-display p {
            color: var(--text-muted);
            font-size: 0.9rem;
            margin-top: 0.5rem;
        }

        .admin-notice {
            font-size: 0.8rem;
            color: var(--accent-pink);
            text-align: center;
            margin-top: 1rem;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 0.4rem;
        }

        /* Course List */
        .course-list {
            list-style: none;
            max-height: 500px;
            overflow-y: auto;
            padding-right: 10px;
        }

        .course-list::-webkit-scrollbar {
            width: 8px;
        }

        .course-list::-webkit-scrollbar-track {
            background: rgba(255, 255, 255, 0.05);
            border-radius: 4px;
        }

        .course-list::-webkit-scrollbar-thumb {
            background: rgba(0, 92, 255, 0.5);
            border-radius: 4px;
        }

        .course-list::-webkit-scrollbar-thumb:hover {
            background: var(--accent-purple);
        }

        .course-item {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 1rem;
            background: rgba(10, 10, 10, 0.5);
            border-radius: 8px;
            margin-bottom: 0.8rem;
            border-left: 3px solid var(--accent-purple);
        }

        .course-info h4 {
            color: var(--text-main);
            margin-bottom: 0.2rem;
        }

        .course-info p {
            font-size: 0.85rem;
            color: var(--text-muted);
        }

        .course-credits {
            background: var(--accent-blue);
            color: white;
            padding: 0.3rem 0.8rem;
            border-radius: 20px;
            font-size: 0.85rem;
            font-weight: bold;
        }

        /* Page Loader */
        .page-loader {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: var(--bg-main);
            z-index: 9999;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            color: var(--accent-blue);
            transition: opacity 0.5s ease;
        }

        .spinner {
            font-size: 4rem;
            margin-bottom: 1.5rem;
            animation: spin 1s linear infinite;
            background: linear-gradient(135deg, var(--accent-blue), var(--accent-purple));
            -webkit-background-clip: text;
            background-clip: text;
            -webkit-text-fill-color: transparent;
        }

        @keyframes spin {
            100% {
                transform: rotate(360deg);
            }
        }

        .page-loader h2 {
            font-family: 'Poppins', sans-serif;
            color: var(--text-main);
            letter-spacing: 1px;
        }
    </style>
</head>

<body>

    <div id="pageLoader" class="page-loader">
        <i class="fa-solid fa-circle-notch spinner"></i>
        <h2>Fetching Student Records...</h2>
    </div>

    <nav class="navbar">
        <div class="logo">
            <i class="fa-solid fa-graduation-cap"></i>
            <span>VITrack</span>
        </div>
        <ul class="nav-links">
            <li><a href="index.html">Home</a></li>
            <li><a href="dashboard.html" class="active">Dashboard</a></li>
            <li><a href="alumni.html">Alumni</a></li>
            <li><a href="#">Mails</a></li>
        </ul>
        <div class="nav-actions">

        </div>
    </nav>

    <div class="dashboard-container animate-slide-up">


        <div class="dash-column">
            <div class="dash-card">
                <div class="profile-header">
                    <div class="profile-img">
                        <i class="fa-solid fa-user"></i>
                    </div>
                    <h2 id="userName">Loading...</h2>
                    <p id="userProgram" style="color: var(--text-muted); font-size: 0.9rem;">Loading...</p>
                    <p id="userRegNo" style="color: var(--text-muted); font-size: 0.8rem; margin-top: 0.2rem;"></p>
                </div>

                <div class="cgpa-display">
                    <h3 id="userCgpa">--</h3>
                    <p>Current CGPA</p>
                </div>
                <button onclick="logout()"
                    style="width: 100%; margin-top: 1.5rem; padding: 0.8rem; background: transparent; border: 1px solid var(--accent-pink); color: var(--accent-pink); border-radius: 8px; cursor: pointer; transition: all 0.3s;"
                    onmouseover="this.style.background='rgba(236, 72, 153, 0.1)'"
                    onmouseout="this.style.background='transparent'"><i
                        class="fa-solid fa-arrow-right-from-bracket"></i> Logout</button>
            </div>
        </div>


        <div class="dash-column">


            <div class="dash-card" style="margin-bottom: 1rem;">
                <h2><i class="fa-solid fa-chart-line"></i> Semester GPA Progress</h2>
                <div style="height: 200px; width: 100%;">
                    <canvas id="gpaChart"></canvas>
                </div>
            </div>


            <div class="dash-card">
                <h2><i class="fa-solid fa-book"></i> Enrolled Courses History</h2>
                <ul class="course-list" id="courseList">
                    <!-- Dynamic courses will be injected here -->
                </ul>
            </div>

        </div>
    </div>


    <script>
        document.addEventListener('DOMContentLoaded', () => {
            const activeUserRegNo = localStorage.getItem('vitrack_active_user');

            if (!activeUserRegNo) {
                // Not logged in
                window.location.href = 'login.html';
                return;
            }

            const user = getUserByRegNo(activeUserRegNo);

            if (!user) {
                // User not found in mock DB (maybe deleted)
                localStorage.removeItem('vitrack_active_user');
                window.location.href = 'login.html';
                return;
            }

            // Populate Profile Data
            document.getElementById('userName').textContent = user.name;
            document.getElementById('userProgram').textContent = `${user.program} (${user.graduationYear})`;
            document.getElementById('userRegNo').textContent = user.registerNumber;
            document.getElementById('userCgpa').textContent = user.cgpa.toFixed(2);

            // Populate Courses
            const courseList = document.getElementById('courseList');
            courseList.innerHTML = ''; // Clear default
            if (user.courses && user.courses.length > 0) {
                user.courses.forEach(course => {
                    const li = document.createElement('li');
                    li.className = 'course-item';
                    li.innerHTML = `
                        <div class="course-info">
                            <h4>${course.name}</h4>
                            <p>Code: ${course.code} • Semester ${course.sem}</p>
                        </div>
                        <div class="course-credits">${course.credits} Credits</div>
                    `;
                    courseList.appendChild(li);
                });
            } else {
                courseList.innerHTML = '<li class="course-item"><p style="color: var(--text-muted)">No enrolled courses found.</p></li>';
            }

            // Initialize Chart
            const ctx = document.getElementById('gpaChart').getContext('2d');
            const gradient = ctx.createLinearGradient(0, 0, 0, 400);
            gradient.addColorStop(0, 'rgba(0, 168, 255, 0.8)');
            gradient.addColorStop(1, 'rgba(0, 92, 255, 0.8)');

            // Prepare dynamic labels based on number of semesters with data
            const labels = [];
            const semGpaData = user.semesterGpa || [];
            for (let i = 1; i <= semGpaData.length; i++) {
                labels.push(`Sem ${i}`);
            }

            // Calculate cumulative GPA trend for line chart roughly
            let cumulativeData = [];
            let sum = 0;
            for (let i = 0; i < semGpaData.length; i++) {
                sum += semGpaData[i];
                cumulativeData.push((sum / (i + 1)).toFixed(2));
            }

            new Chart(ctx, {
                type: 'bar',
                data: {
                    labels: labels,
                    datasets: [
                        {
                            type: 'line',
                            label: 'Cumulative GPA Trend',
                            data: cumulativeData,
                            borderColor: '#ec4899',
                            borderWidth: 3,
                            pointBackgroundColor: '#ec4899',
                            pointHoverRadius: 6,
                            fill: false,
                            tension: 0.4
                        },
                        {
                            type: 'bar',
                            label: 'Semester GPA',
                            data: semGpaData,
                            backgroundColor: gradient,
                            borderRadius: 6,
                            borderWidth: 0
                        }
                    ]
                },
                options: {
                    responsive: true,
                    maintainAspectRatio: false,
                    scales: {
                        y: {
                            beginAtZero: false,
                            min: 6.0,
                            max: 10.0,
                            grid: {
                                color: 'rgba(255, 255, 255, 0.05)'
                            },
                            ticks: {
                                color: '#94a3b8'
                            }
                        },
                        x: {
                            grid: {
                                display: false
                            },
                            ticks: {
                                color: '#94a3b8'
                            }
                        }
                    },
                    plugins: {
                        legend: {
                            labels: {
                                color: '#f8fafc',
                                font: {
                                    family: "'Poppins', sans-serif"
                                }
                            }
                        },
                        tooltip: {
                            backgroundColor: 'rgba(10, 10, 10, 0.9)',
                            titleFont: { family: "'Poppins', sans-serif" },
                            bodyFont: { family: "'Poppins', sans-serif" },
                            padding: 12,
                            cornerRadius: 8
                        }
                    }
                }
            });

            // Simulate DB fetching delay conditionally
            const loader = document.getElementById('pageLoader');
            if (localStorage.getItem('vitrack_show_loader') === 'true') {
                localStorage.removeItem('vitrack_show_loader');
                setTimeout(() => {
                    loader.style.opacity = '0';
                    setTimeout(() => loader.style.display = 'none', 500); // Wait for transition
                }, 1200);
            } else {
                loader.style.display = 'none';
            }
        });

        function logout() {
            localStorage.removeItem('vitrack_active_user');
            window.location.href = 'index.html';
        }
    </script>


    <footer>
        <div class="footer-bottom" style="border-top: none; padding-top: 0;">
            <p>&copy; 2026 Project for Web-Development course by Dr Suvidha Rupesh Kumar.</p>
        </div>
    </footer>
</body>

</html>
