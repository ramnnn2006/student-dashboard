<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>VITrack - Login</title>
    <!--For fonts-->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600;700&display=swap" rel="stylesheet">
    <!--For icons-->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link rel="stylesheet" href="style.css">
    <style>
        .login-container {
            min-height: calc(100vh - 160px);
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 2rem;
        }

        .login-card {
            background: var(--bg-card);
            border-radius: 15px;
            padding: 3rem;
            width: 100%;
            max-width: 450px;
            border: 1px solid var(--glass-border);
            text-align: center;
            box-shadow: 0 10px 30px rgba(0, 0, 0, 0.5);
        }

        .login-header {
            margin-bottom: 2rem;
        }

        .login-header h2 {
            font-size: 2rem;
            color: var(--accent-blue);
            margin-bottom: 0.5rem;
        }

        .login-header p {
            color: var(--text-muted);
        }

        .form-group {
            margin-bottom: 1.5rem;
            text-align: left;
        }

        .form-group label {
            display: block;
            margin-bottom: 0.5rem;
            color: var(--text-main);
            font-size: 0.9rem;
        }

        .form-control {
            width: 100%;
            padding: 0.8rem 1rem;
            background: rgba(10, 10, 10, 0.5);
            border: 1px solid var(--glass-border);
            border-radius: 8px;
            color: var(--text-main);
            font-family: 'Poppins', sans-serif;
            transition: all 0.3s;
        }

        .form-control:focus {
            outline: none;
            border-color: var(--accent-blue);
            box-shadow: 0 0 0 2px rgba(0, 168, 255, 0.2);
        }

        .login-btn {
            width: 100%;
            padding: 1rem;
            background: linear-gradient(135deg, var(--accent-blue), var(--accent-purple));
            color: white;
            border: none;
            border-radius: 8px;
            font-weight: 600;
            font-size: 1rem;
            cursor: pointer;
            transition: opacity 0.3s, transform 0.2s;
            margin-top: 1rem;
        }

        .login-btn:hover {
            opacity: 0.9;
            transform: translateY(-2px);
        }

        #errorMsg {
            color: var(--accent-pink);
            font-size: 0.85rem;
            margin-top: 1rem;
            display: none;
            background: rgba(236, 72, 153, 0.1);
            padding: 0.8rem;
            border-radius: 8px;
            border: 1px solid rgba(236, 72, 153, 0.2);
        }

        .demo-credentials {
            margin-top: 2rem;
            padding-top: 2rem;
            border-top: 1px solid var(--glass-border);
            color: var(--text-muted);
            font-size: 0.85rem;
        }

        .demo-pass {
            display: inline-block;
            background: rgba(255, 255, 255, 0.05);
            padding: 0.2rem 0.5rem;
            border-radius: 4px;
            margin: 0.2rem;
            font-family: monospace;
            cursor: pointer;
            transition: background 0.3s;
        }

        .demo-pass:hover {
            background: rgba(255, 255, 255, 0.1);
        }
    </style>
</head>

<body>
    <nav class="navbar">
        <div class="logo">
            <i class="fa-solid fa-graduation-cap"></i>
            <span>VITrack</span>
        </div>
        <ul class="nav-links">
            <li><a href="index.html">Home</a></li>
            <li><a href="dashboard.html">Dashboard</a></li>
            <li><a href="alumni.html">Alumni</a></li>
            <li><a href="#">Mails</a></li>
        </ul>
        <div class="nav-actions">
        </div>
    </nav>

    <div class="login-container animate-slide-up">
        <div class="login-card">
            <div class="login-header">
                <h2>Welcome Back</h2>
                <p>Enter your Student Register Number</p>
            </div>
            <form id="loginForm">
                <div class="form-group">
                    <label for="regNo">Register Number</label>
                    <input type="text" id="regNo" class="form-control" placeholder="e.g. 24BCE1001" autocomplete="off"
                        required>
                </div>
                <div class="form-group">
                    <label for="password">Password</label>
                    <input type="password" id="password" class="form-control" placeholder="Enter password"
                        autocomplete="off" required>
                </div>
                <button type="submit" class="login-btn">
                    <i class="fa-solid fa-right-to-bracket"></i> Access Dashboard
                </button>
                <div id="errorMsg">
                    <i class="fa-solid fa-circle-exclamation"></i> Invalid Credentials. Please try again.
                </div>
            </form>
        </div>
    </div>

    <footer>
        <div class="footer-bottom" style="border-top: none; padding-top: 0;">
            <p>&copy; 2026 Project for Web-Development course by Dr Suvidha Rupesh Kumar.</p>
        </div>
    </footer>

    <!-- Include our mock database script -->
    <script src="data.js"></script>
    <script>
        document.getElementById('loginForm').addEventListener('submit', function (e) {
            e.preventDefault();
            const regNoInput = document.getElementById('regNo').value.trim();
            const passwordInput = document.getElementById('password').value;
            const errorMsg = document.getElementById('errorMsg');

            // Check if user exists in the mock database
            const user = getUserByRegNo(regNoInput);

            if (user && user.password === passwordInput) {
                // Hide error
                errorMsg.style.display = 'none';

                // Change button state to loading
                const loginBtn = document.querySelector('.login-btn');
                loginBtn.disabled = true;
                loginBtn.innerHTML = '<i class="fa-solid fa-circle-notch fa-spin"></i> Authenticating...';
                loginBtn.style.opacity = '0.7';

                // Simulate network/DB delay
                setTimeout(() => {
                    // Save active user to localStorage
                    localStorage.setItem('vitrack_active_user', user.registerNumber);

                    // Redirect exactly to dashboard
                    window.location.href = 'dashboard.html';
                }, 1500);
            } else {
                // Show error
                errorMsg.style.display = 'block';
                // Add shake animation
                const card = document.querySelector('.login-card');
                card.style.animation = 'shake 0.5s';
                setTimeout(() => card.style.animation = '', 500);
            }
        });
    </script>
</body>

</html>
